<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JejuNow Pro — 제주 여행의 모든 것</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* [스타일 시트는 기존의 유려한 디자인을 유지하되, 데이터 가독성을 위해 일부 최적화됨] */
        :root {
            --bg: #0a0e1a; --bg2: #0f1420; --surface: #141928; --card: #1a2035;
            --text: #eef0f6; --teal: #0dd8c8; --gold: #f0c060; --coral: #ff6b6b;
            --r-lg: 20px; --ease: cubic-bezier(0.16,1,0.3,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .wrap { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
        
        /* Navigation & Common UI... (생략: 기존 디자인 유지) */
        .nav { position: fixed; top: 0; width: 100%; height: 62px; background: rgba(10,14,26,0.8); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; max-width: 1240px; margin: 0 auto; padding: 0 24px; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--teal); cursor: pointer; }
        
        /* Grid System */
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 24px; }
        .page { display: none; padding-top: 80px; min-height: 100vh; }
        .page.active { display: block; }
        
        /* Card UI */
        .card { background: var(--card); border-radius: var(--r-lg); overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-img { width: 100%; aspect-ratio: 3/2; object-fit: cover; }
        .card-body { padding: 16px; }
        .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; }
        .card-meta { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        
        /* Map UI */
        .map-container { display: flex; height: calc(100vh - 62px); }
        .map-sidebar { width: 350px; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; background: var(--surface); }
        .map-canvas { flex: 1; background: #070a14; position: relative; overflow: hidden; }
        
        /* Tab & Search */
        .search-wrap { padding: 20px; background: var(--bg2); position: sticky; top: 0; z-index: 10; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--card); color: white; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <div class="logo" onclick="showPage('home')">JejuNow.</div>
        <div style="display:flex; gap:20px;">
            <span onclick="showPage('explore')" style="cursor:pointer">탐색</span>
            <span onclick="showPage('map')" style="cursor:pointer">지도</span>
            <span onclick="showPage('planner')" style="cursor:pointer">AI일정</span>
        </div>
    </div>
</nav>

<div id="home" class="page active">
    <div class="wrap">
        <h1 style="font-size: 3rem; margin: 40px 0;">제주의 모든 순간,<br><span style="color:var(--teal)">JejuNow</span>와 함께</h1>
        <h2>인기 급상승 여행지</h2>
        <div id="home-trending" class="grid-4"></div>
    </div>
</div>

<div id="explore" class="page">
    <div class="wrap">
        <div class="search-wrap">
            <input type="text" id="searchInput" class="search-input" placeholder="장소, 지역, 키워드로 검색 (예: 애월 흑돼지)" oninput="handleSearch()">
        </div>
        <div id="explore-grid" class="grid-4"></div>
    </div>
</div>

<script>
/** ─────────────────
 * DATA: 50+ PLACES
 * ───────────────── */
const PLACES = [
    { id: 1, name: "성산일출봉", area: "성산", type: "attraction", cat: "자연", rating: 4.9, tags: ["UNESCO", "일출", "동부"], img: "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=500", px: 85, py: 45 },
    { id: 2, name: "협재해수욕장", area: "한림", type: "attraction", cat: "해변", rating: 4.8, tags: ["에메랄드", "노을", "서부"], img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500", px: 20, py: 50 },
    { id: 3, name: "오설록 티뮤지엄", area: "안덕", type: "attraction", cat: "체험", rating: 4.6, tags: ["녹차", "카페", "박물관"], img: "https://images.unsplash.com/photo-1504196606672-aef5c9cefc92?w=500", px: 25, py: 70 },
    { id: 4, name: "우도(소머리오름)", area: "성산", type: "attraction", cat: "섬", rating: 4.8, tags: ["섬속의섬", "전망", "액티비티"], img: "https://images.unsplash.com/photo-1549887534-3db0a1c3c4c2?w=500", px: 92, py: 40 },
    { id: 5, name: "돈사돈 본점", area: "제주시", type: "food", cat: "흑돼지", rating: 4.7, tags: ["근고기", "로컬맛집", "수요미식회"], img: "https://images.unsplash.com/photo-1555992336-03a23c7b20ee?w=500", px: 45, py: 30 },
    { id: 6, name: "카페 델문도", area: "함덕", type: "cafe", cat: "오션뷰", rating: 4.5, tags: ["함덕해변", "베이커리", "전망"], img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500", px: 65, py: 25 },
    { id: 7, name: "만장굴", area: "구좌", type: "attraction", cat: "자연", rating: 4.4, tags: ["동굴", "여름에시원한", "UNESCO"], img: "https://images.unsplash.com/photo-1518098268026-4e89f1a2cd8e?w=500", px: 75, py: 35 },
    { id: 8, name: "섭지코지", area: "성산", type: "attraction", cat: "자연", rating: 4.7, tags: ["산책로", "올인하우스", "동부"], img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=500", px: 88, py: 50 },
    { id: 9, name: "오는정김밥", area: "서귀포", type: "food", cat: "분식", rating: 4.6, tags: ["예약필수", "김밥맛집", "인생김밥"], img: "https://images.unsplash.com/photo-1534422298391-e4f8c170db76?w=500", px: 50, py: 80 },
    { id: 10, name: "카멜리아힐", area: "안덕", type: "attraction", cat: "공원", rating: 4.5, tags: ["동백꽃", "포토존", "수국"], img: "https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?w=500", px: 30, py: 75 },
    // ... 추가 40개 데이터는 아래 로직에 의해 무작위 생성(데모용) 하거나 실제 데이터를 더 채울 수 있습니다.
];

// 데이터 벌크 업 (실제로는 수동으로 50개를 채우는 것이 좋지만, 구조 확인을 위해 자동 생성 포함)
for(let i=11; i<=60; i++) {
    PLACES.push({
        id: i,
        name: `제주 명소 #${i}`,
        area: ["애월", "서귀포", "남원", "표선", "조천"][i%5],
        type: ["attraction", "food", "cafe"][i%3],
        cat: "테마여행",
        rating: (4 + Math.random()).toFixed(1),
        tags: ["제주", "여행", "추천"],
        img: `https://picsum.photos/seed/${i+100}/500/350`,
        px: Math.random()*80 + 10,
        py: Math.random()*70 + 15
    });
}

/** ─────────────────
 * CORE LOGIC
 * ───────────────── */

// 1. 검색 정규화 함수 (띄어쓰기, 대소문자 제거)
const norm = (s) => s.toLowerCase().replace(/\s/g, "");

function handleSearch() {
    const query = norm(document.getElementById('searchInput').value);
    const filtered = PLACES.filter(p => 
        norm(p.name).includes(query) || 
        norm(p.area).includes(query) || 
        p.tags.some(t => norm(t).includes(query))
    );
    renderGrid('explore-grid', filtered);
}

function renderGrid(targetId, data) {
    const container = document.getElementById(targetId);
    if(!container) return;
    container.innerHTML = data.map(p => `
        <div class="card" onclick="alert('${p.name} 상세보기 준비 중!')">
            <img src="${p.img}" class="card-img" alt="${p.name}">
            <div class="card-body">
                <div class="card-meta">${p.area} · ${p.cat}</div>
                <div class="card-title">${p.name}</div>
                <div style="color:var(--gold)">★ ${p.rating}</div>
                <div style="margin-top:8px;">
                    ${p.tags.map(t => `<span style="font-size:0.7rem; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px; margin-right:4px;">#${t}</span>`).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if(pageId === 'explore') handleSearch();
    if(pageId === 'home') renderGrid('home-trending', PLACES.slice(0, 8));
}

// 초기 로딩
window.onload = () => {
    showPage('home');
};
</script>

</body>
</html>
