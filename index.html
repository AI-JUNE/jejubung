<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>JejuNow Pro — 제주 여행의 모든 것</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ===========================================
   JEJUNOW DESIGN SYSTEM (원본 유지)
=========================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e1a; --bg2: #0f1420; --surface: #141928; --card: #1a2035;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #eef0f6; --text2: rgba(238,240,246,0.6); --text3: rgba(238,240,246,0.3);
  --teal: #0dd8c8; --teal2: rgba(13,216,200,0.12); --gold: #f0c060; --coral: #ff6b6b;
  --ff-display: 'Playfair Display', Georgia, serif; --ff-body: 'Noto Sans KR', sans-serif;
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px; --r-full: 9999px;
  --sh-lg: 0 24px 64px rgba(0,0,0,0.6); --ease: cubic-bezier(0.25,0.46,0.45,0.94); --ease2: cubic-bezier(0.16,1,0.3,1);
}
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: var(--ff-body); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

/* LAYOUT */
.wrap { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
.section { padding: 80px 0; }
.page { display: none; }
.page.on { display: block; }

/* NAVIGATION */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 900; height: 62px; display: flex; align-items: center; transition: all 0.3s; border-bottom: 1px solid transparent; }
.nav.scrolled { background: rgba(10,14,26,0.92); backdrop-filter: blur(20px); border-color: var(--border); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1240px; margin: 0 auto; padding: 0 24px; }
.logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.logo-text { font-family: var(--ff-display); font-size: 1.3rem; font-weight: 600; }
.logo-dot { width: 7px; height: 7px; background: var(--teal); border-radius: 50%; }
.nav-links { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--r-full); padding: 4px; }
.nav-link { padding: 7px 16px; border-radius: var(--r-full); font-size: 0.83rem; font-weight: 500; color: var(--text2); cursor: pointer; border: none; background: none; transition: 0.2s; }
.nav-link.on { background: rgba(255,255,255,0.1); color: var(--text); }

/* HERO */
.hero { position: relative; min-height: 100vh; display: flex; align-items: flex-end; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1539367628448-4bc5c9d171c8?w=1800') center/cover; transform: scale(1.03); transition: 8s ease-out; }
.hero-bg.loaded { transform: scale(1); }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, rgba(10,14,26,0.3) 60%, transparent 100%); }
.hero-content { position: relative; z-index: 2; padding: 0 24px 80px; width: 100%; max-width: 1240px; margin: 0 auto; }
.hero-title { font-family: var(--ff-display); font-size: clamp(2.8rem, 6vw, 5rem); line-height: 1.1; margin-bottom: 20px; }
.hero-title em { color: var(--gold); font-style: italic; }

/* CARDS & GRID */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
@media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .grid-4 { grid-template-columns: 1fr; } }

.card { background: var(--card); border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.35s var(--ease2); position: relative; }
.card:hover { transform: translateY(-5px); box-shadow: var(--sh-lg); border-color: var(--border2); }
.card-img-wrap { position: relative; aspect-ratio: 3/2; overflow: hidden; background: var(--surface); }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
.card:hover img { transform: scale(1.05); }
.card-body { padding: 16px; }
.card-area { font-size: 0.7rem; font-weight: 700; color: var(--teal); text-transform: uppercase; margin-bottom: 4px; }
.card-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; }
.card-meta { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
.stars { color: var(--gold); }

/* EXPLORE PAGE */
.explore-header { padding: 100px 0 40px; background: var(--bg2); }
.search-bar { display: flex; max-width: 600px; background: var(--card); border: 1px solid var(--border2); border-radius: var(--r-md); overflow: hidden; margin-top: 20px; }
.search-input { flex: 1; padding: 15px; background: none; border: none; color: white; outline: none; }
.search-btn { padding: 0 20px; background: var(--teal); border: none; font-weight: 700; cursor: pointer; }

/* REVEAL ANIMATION */
.sr { opacity: 0; transform: translateY(20px); transition: 0.6s var(--ease2); }
.sr.visible { opacity: 1; transform: translateY(0); }

/* MAP PAGE */
.map-wrap { display: flex; height: calc(100vh - 62px); margin-top: 62px; }
.map-list { width: 350px; overflow-y: auto; background: var(--surface); border-right: 1px solid var(--border); }
.map-canvas { flex: 1; background: #0b1828; position: relative; }
.map-item { display: flex; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; gap: 12px; }
.map-item:hover { background: var(--card); }
.mi-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
</style>
</head>
<body>

<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <div class="logo" onclick="goPage('home')">
      <span class="logo-text">JejuNow</span><div class="logo-dot"></div>
    </div>
    <div class="nav-links">
      <button class="nav-link on" id="nl-home" onclick="goPage('home')">홈</button>
      <button class="nav-link" id="nl-explore" onclick="goPage('explore')">탐색</button>
      <button class="nav-link" id="nl-map" onclick="goPage('map')">지도</button>
      <button class="nav-link" id="nl-planner" onclick="goPage('planner')">AI 일정</button>
    </div>
  </div>
</nav>

<div class="page on" id="page-home">
  <section class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title sr">제주를<br><em>다시</em> 발견하다</h1>
      <button class="nav-link on" style="padding: 15px 30px; background: var(--teal); color: black;" onclick="goPage('explore')">지금 탐색하기</button>
    </div>
  </section>
  <section class="section wrap">
    <h2 class="sr" style="margin-bottom: 30px;">에디터 추천 장소</h2>
    <div class="grid-4" id="home-grid"></div>
  </section>
</div>

<div class="page" id="page-explore">
  <header class="explore-header">
    <div class="wrap">
      <h1>제주 탐색</h1>
      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="장소, 지역을 검색하세요..." oninput="doSearch()">
        <button class="search-btn">검색</button>
      </div>
    </div>
  </header>
  <div class="section wrap">
    <div class="grid-4" id="exploreGrid"></div>
  </div>
</div>

<div class="page" id="page-map">
  <div class="map-wrap">
    <div class="map-list" id="mapList"></div>
    <div class="map-canvas" id="mapCanvas">
      <svg style="width:100%; height:100%;" viewBox="0 0 900 500" id="pinsSvg"></svg>
    </div>
  </div>
</div>

<div class="page" id="page-planner">
  <div class="section wrap" style="text-align: center; padding-top: 150px;">
    <h1>AI 일정 생성기</h1>
    <p style="color: var(--text2); margin-top: 20px;">사용자의 스타일에 맞는 최적의 동선을 구성 중입니다...</p>
    <button onclick="alert('일정 생성 알고리즘 가동 중!')" style="margin-top: 30px; padding: 15px 40px; background: var(--teal); border: none; border-radius: 50px; font-weight: 700; cursor: pointer;">생성 시작</button>
  </div>
</div>

<script>
/* ─────────────────
   DATA: 50+ PLACES
───────────────── */
const PLACES = [
  { id:0, name:'성산일출봉', area:'성산', type:'attraction', cat:'관광지', rating:4.9, cnt:3842, tags:['일출','UNESCO'], img:'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=600', px:80, py:45 },
  { id:1, name:'한라산', area:'제주시', type:'attraction', cat:'자연', rating:4.8, cnt:5621, tags:['등산','백록담'], img:'https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?w=600', px:50, py:50 },
  { id:2, name:'협재해수욕장', area:'한림', type:'attraction', cat:'해변', rating:4.7, cnt:2984, tags:['에메랄드','바다'], img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600', px:20, py:45 },
  { id:3, name:'애월 카페거리', area:'애월', type:'cafe', cat:'카페', rating:4.9, cnt:4521, tags:['오션뷰','감성'], img:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600', px:25, py:35 },
  { id:4, name:'만장굴', area:'구좌', type:'attraction', cat:'동굴', rating:4.5, cnt:1876, tags:['세계유산'], img:'https://images.unsplash.com/photo-1518098268026-4e89f1a2cd8e?w=600', px:70, py:30 }
];

// 데이터 확장 (55개까지 생성)
const areas = ['애월','성산','제주시','서귀포','한림','구좌','남원'];
const types = ['attraction','food','cafe'];
for(let i=5; i<55; i++) {
  const type = types[i % 3];
  PLACES.push({
    id: i,
    name: `제주 ${type==='cafe'?'감성 카페':type==='food'?'로컬 맛집':'추천 명소'} #${i}`,
    area: areas[i % areas.length],
    type: type,
    cat: type==='cafe'?'카페':type==='food'?'식당':'명소',
    rating: (4.0 + Math.random()).toFixed(1),
    cnt: Math.floor(Math.random()*1000),
    tags: ['추천','제주'],
    img: `https://picsum.photos/seed/${i+10}/600/400`,
    px: 15 + Math.random()*70,
    py: 15 + Math.random()*70
  });
}

/* ─────────────────
   CORE FUNCTIONS
───────────────── */
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('on'));
  document.getElementById('nl-'+id).classList.add('on');
  window.scrollTo(0,0);
  if(id === 'explore') renderExplore();
  if(id === 'map') renderMap();
}

const normalize = (s) => s.toLowerCase().replace(/\s/g, "");

function makeCard(p) {
  return `
    <div class="card sr">
      <div class="card-img-wrap"><img src="${p.img}" alt="${p.name}"></div>
      <div class="card-body">
        <div class="card-area">${p.area}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-meta">
          <span class="stars">★ ${p.rating}</span>
          <span style="color:var(--text3)">(${p.cnt})</span>
        </div>
      </div>
    </div>`;
}

function renderExplore() {
  const q = normalize(document.getElementById('searchInput').value || "");
  const list = PLACES.filter(p => normalize(p.name).includes(q) || normalize(p.area).includes(q));
  document.getElementById('exploreGrid').innerHTML = list.map(makeCard).join('');
  runReveal();
}

function renderMap() {
  const listEl = document.getElementById('mapList');
  const pinsEl = document.getElementById('pinsSvg');
  listEl.innerHTML = PLACES.map(p => `
    <div class="map-item" onclick="alert('${p.name} 위치로 이동')">
      <img src="${p.img}" class="mi-img">
      <div>
        <div style="font-weight:700; font-size:0.9rem;">${p.name}</div>
        <div style="font-size:0.75rem; color:var(--teal);">${p.area}</div>
      </div>
    </div>`).join('');
  
  pinsEl.innerHTML = PLACES.map(p => {
    const x = (p.px / 100) * 900;
    const y = (p.py / 100) * 500;
    return `<circle cx="${x}" cy="${y}" r="6" fill="var(--teal)"><animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite" /></circle>`;
  }).join('');
}

function runReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.sr').forEach(el => observer.observe(el));
}

window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 20);
});

window.onload = () => {
  document.getElementById('heroBg').classList.add('loaded');
  document.getElementById('home-grid').innerHTML = PLACES.slice(0, 8).map(makeCard).join('');
  runReveal();
};
</script>
</body>
</html>
